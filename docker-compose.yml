version: '3.8'

services:

  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      # Copy your .env file or pass the key directly:
      # GROQ_API_KEY: your_key_here
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      # Persist the SQLite database file between container restarts
      - ./backend:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    environment:
      # Allows the frontend container to reach the backend by service name
      API_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
